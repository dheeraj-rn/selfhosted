---
services:
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    networks:
      - traefik_network
      - database_network
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - DOCKER_MODS=linuxserver/mods:universal-package-install
      - INSTALL_PACKAGES=ffmpeg|nodejs|coreutils|perl|ghostscript|libva-utils|mesa-va-gallium|mesa-dri-gallium
      - LIBVA_DRIVER_NAME=v3d
      - MESA_LOADER_DRIVER_OVERRIDE=v3d
      - GALLIUM_DRIVER=v3d
      - LIBVA_DRIVERS_PATH=/usr/lib/dri
    volumes:
      - ${CONFIG_BASE_DIR}/Nextcloud:/config
      - ${MEDIA_BASE_DIR}/Nextcloud:/data
    devices:
      - /dev/dri:/dev/dri # For Intel/AMD or Pi 4/5 GPU access
    group_add:
      - "44" # video group for GPU access
      - "105" # render group
    # ports:
    #   - 444:443
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${DOMAINNAME}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls=true"
      - "traefik.http.routers.nextcloud.tls.certresolver=cloudflare"
      - "traefik.http.routers.nextcloud.service=nextcloud"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=443"
      - "traefik.http.services.nextcloud.loadbalancer.server.scheme=https"
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.regex=^https://(.*)/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.replacement=https://$${1}/remote.php/dav/"
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.nextcloud.middlewares=nextcloud-redirect"
    restart: unless-stopped

networks:
  database_network:
    external: true
  traefik_network:
    external: true