---
services:
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    networks:
      - traefik_network
    ports:
      - 8084:80
    labels:
      - "traefik.enable=true"
      # - "traefik.docker.network=traefik_network"
      # - "traefik.http.routers.ittools.entrypoints=web"
      # - "traefik.http.routers.ittools.rule=Host(`it-tools.local`)"
      - "traefik.http.routers.ittools.tls=true"
      - "traefik.http.routers.ittools.tls.certresolver=cloudflare"
      - "traefik.http.routers.ittools.entrypoints=websecure"
      - "traefik.http.routers.ittools.rule=Host(`itt.${DOMAINNAME}`)"
    restart: unless-stopped

networks:
  traefik_network:
    external: true
