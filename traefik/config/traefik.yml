global:
  checkNewVersion: true
  sendAnonymousUsage: false
log:
  level: DEBUG

# Enable Access Logs (defaults to stdout)
accessLog:
  filePath: "/var/log/traefik/access.log"

# Enable Metrics (e.g., exposing them to Prometheus)
metrics:
  prometheus: {}

api:
  dashboard: true
  insecure: true
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

serversTransport:
  insecureSkipVerify: true

certificatesResolvers:
  cloudflare:
    acme:
      email: "example@email.com"
      storage: "/var/traefik/certs/cloudflare-acme.json"
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      keyType: "EC256"
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    filename: "/etc/traefik/traefik-dynamic.yml"
    watch: true