---
services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "6001:8080"
    environment:
      - TZ=${TZ}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml:ro
      - ./data/certs:/var/traefik/certs/:rw
    networks:
      - traefik_network
    restart: 'unless-stopped'

networks:
  traefik_network:
    external: true
  master_network:
    external: true